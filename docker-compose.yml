services:
  n8n:
    image: n8nio/n8n:latest
    container_name: oldcare-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://192.168.100.17:5678/
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Asia/Karachi
      - TZ=Asia/Karachi
    volumes:
      - n8n_n8n_data:/home/node/.n8n

volumes:
  n8n_n8n_data:
    external: true
